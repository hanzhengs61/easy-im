Name: user-api
Host: 0.0.0.0
Port: 8888

# MySQL 配置
Mysql:
  DataSource: "easy_im:easy-im-123456@tcp(127.0.0.1:3306)/easy_im?charset=utf8mb4&parseTime=true&loc=Local"

